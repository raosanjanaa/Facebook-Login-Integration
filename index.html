<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FB Login App</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
--bg:#070A12;
--card:rgba(255,255,255,0.06);
--border:rgba(255,255,255,0.08);
--text:#fff;
--muted:#9aa4b2;
--fb:#1877F2;
--fb2:#0d63d6;
--radius:20px;
}

body{
font-family:'DM Sans',sans-serif;
background:var(--bg);
overflow:hidden;
color:var(--text);
}

/* background gradient glow */
body::before{
content:"";
position:fixed;inset:0;
background:radial-gradient(circle at 20% 20%, rgba(24,119,242,0.25), transparent 40%),
radial-gradient(circle at 80% 80%, rgba(255,0,128,0.15), transparent 40%);
z-index:0;
}

/* sparkle layer */
.sparkles{
position:fixed;
inset:0;
overflow:hidden;
z-index:0;
}

.sparkles span{
position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
opacity:0.6;
animation:float 10s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);opacity:0}
20%{opacity:0.8}
100%{transform:translateY(-100vh);opacity:0}
}

/* layout */
#app{
position:relative;
z-index:1;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;
}

/* glass card */
.card{
width:100%;
max-width:420px;
background:var(--card);
border:1px solid var(--border);
backdrop-filter:blur(20px);
border-radius:var(--radius);
padding:40px;
box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

/* screen */
.screen{display:none}
.screen.active{display:block}

/* facebook logo */
.fb-logo{
width:70px;
height:70px;
margin:0 auto 20px;
display:flex;
align-items:center;
justify-content:center;
border-radius:18px;
background:rgba(24,119,242,0.15);
}

/* title */
h1{
text-align:center;
font-family:'Syne',sans-serif;
font-size:1.8rem;
margin-bottom:6px;
}

p{
text-align:center;
color:var(--muted);
margin-bottom:25px;
font-size:0.9rem;
}

/* button */
.btn-facebook{
width:100%;
padding:14px;
background:var(--fb);
border:none;
border-radius:12px;
color:white;
font-size:1rem;
cursor:pointer;
transition:0.2s;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

.btn-facebook:hover{
background:var(--fb2);
transform:translateY(-2px);
}

/* profile */
.profile-img{
width:90px;
height:90px;
border-radius:50%;
display:block;
margin:0 auto 10px;
border:2px solid rgba(255,255,255,0.2);
}

.center{text-align:center}

/* fields */
.field{
margin:10px 0;
padding:10px;
background:rgba(255,255,255,0.04);
border-radius:10px;
font-size:0.9rem;
}

label{
font-size:0.7rem;
color:var(--muted);
text-transform:uppercase;
}

/* logout */
.logout{
margin-top:15px;
width:100%;
padding:12px;
border:1px solid rgba(255,100,100,0.4);
background:transparent;
color:#ff6b6b;
border-radius:10px;
cursor:pointer;
}

@media(max-width:480px){
.card{padding:25px}
}
</style>
</head>

<body>

<div class="sparkles" id="sparkles"></div>

<div id="app">

<!-- LOGIN -->
<div class="screen active" id="loginScreen">
<div class="card">

<div class="fb-logo">
<svg width="32" height="32" fill="#1877F2" viewBox="0 0 24 24">
<path d="M22 12a10 10 0 1 0-11.5 9.9v-7H8v-3h2.5V9.5c0-2.5 1.5-3.9 3.8-3.9 1.1 0 2.2.2 2.2.2v2.4h-1.2c-1.2 0-1.6.7-1.6 1.5V12H17l-.5 3h-2v7A10 10 0 0 0 22 12"/>
</svg>
</div>

<h1>FB Login App</h1>
<p>Sign in with Facebook to continue</p>

<button class="btn-facebook" onclick="handleFBLogin()">
Continue with Facebook
</button>

</div>
</div>

<!-- PROFILE -->
<div class="screen" id="profileScreen">
<div class="card center">

<img id="profilePic" class="profile-img"/>

<h2 id="profileName"></h2>

<div class="field"><label>Name</label><div id="fieldName"></div></div>
<div class="field"><label>Email</label><div id="fieldEmail"></div></div>
<div class="field"><label>ID</label><div id="fieldId"></div></div>

<button class="logout" onclick="handleLogout()">Logout</button>

</div>
</div>

</div>

<div id="fb-root"></div>

<script>
const FB_APP_ID='962740976398168';

function showScreen(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function handleFBLogin(){
FB.login(res=>{
if(res.authResponse) fetchUser();
else alert("Login cancelled");
},{scope:'public_profile,email'});
}

function fetchUser(){
FB.api('/me',{fields:'id,name,email,picture'},res=>{
document.getElementById('profilePic').src=res.picture.data.url;
document.getElementById('profileName').innerText=res.name;
document.getElementById('fieldName').innerText=res.name;
document.getElementById('fieldEmail').innerText=res.email||'Not provided';
document.getElementById('fieldId').innerText=res.id;
showScreen('profileScreen');
});
}

function handleLogout(){
FB.logout(()=>showScreen('loginScreen'));
}

/* sparkles */
function createSparkles(){
const c=document.getElementById('sparkles');
for(let i=0;i<40;i++){
let s=document.createElement('span');
s.style.left=Math.random()*100+'%';
s.style.top=Math.random()*100+'%';
s.style.animationDuration=(5+Math.random()*10)+'s';
s.style.opacity=Math.random();
c.appendChild(s);
}
}
createSparkles();

window.fbAsyncInit=function(){
FB.init({
appId:FB_APP_ID,
cookie:true,
xfbml:true,
version:'v19.0'
});
};

(function(d,s,id){
let js,fjs=d.getElementsByTagName(s)[0];
if(d.getElementById(id))return;
js=d.createElement(s);js.id=id;
js.src="https://connect.facebook.net/en_US/sdk.js";
fjs.parentNode.insertBefore(js,fjs);
}(document,'script','fb-jssdk'));
</script>

</body>
</html>
