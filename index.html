<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FB Login App</title>

  <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>



<div id="app">

  <!-- LOGIN -->
  <div id="loginScreen" class="screen active">
    <button id="fbLoginBtn">Continue with Facebook</button>
  </div>

  <!-- PROFILE -->
  <div id="profileScreen" class="screen">
    <h2 id="profileName"></h2>
    <img id="profilePic" />
    <p id="email"></p>
    <p id="id"></p>
    <button id="logoutBtn">Logout</button>
  </div>

</div>

<div id="fb-root"></div>

<script src="https://connect.facebook.net/en_US/sdk.js"></script>

<script src="assets/js/config.js"></script>
<script src="assets/js/storage.service.js"></script>
<script src="assets/js/ui.service.js"></script>
<script src="assets/js/facebook.service.js"></script>
<script src="assets/js/app.js"></script>

</body>
</html>
