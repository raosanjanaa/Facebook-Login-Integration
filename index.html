<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FB Login App</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ===== RESET ===== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

:root{
--bg:#050510;
--text:#eee;
--muted:#6b6b99;
--accent:#4f6ef7;
--accent2:#a78bfa;
--accent3:#60e0ff;
--card:rgba(15,15,35,.85);
--border:rgba(100,120,255,.12);
--radius:24px;
--radius-sm:14px;
}

body{
font-family:Outfit;
background:var(--bg);
color:var(--text);
overflow-x:hidden;
}

/* ===== BACKGROUND ===== */
.blob{position:fixed;border-radius:50%;filter:blur(100px);z-index:0;}
.blob-1{width:600px;height:600px;background:radial-gradient(circle,#4f6ef730,transparent);top:-200px;left:-200px;}
.blob-2{width:500px;height:500px;background:radial-gradient(circle,#a78bfa20,transparent);bottom:-200px;right:-200px;}
.blob-3{width:400px;height:400px;background:radial-gradient(circle,#60e0ff20,transparent);top:50%;left:50%;transform:translate(-50%,-50%);}

/* ===== APP ===== */
#app{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}

.screen{display:none;max-width:460px;width:100%;}
.screen.active{display:block;}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:var(--radius);
padding:40px;
backdrop-filter:blur(30px);
}

/* ===== SPLASH ===== */
#splashScreen{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:var(--bg);
z-index:999;
}

/* spinner */
.spinner{
width:45px;height:45px;
border:2px solid #333;
border-top-color:var(--accent);
border-radius:50%;
animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* ===== BUTTON ===== */
.btn-facebook{
width:100%;
padding:15px;
border:none;
border-radius:14px;
background:#1877F2;
color:#fff;
font-weight:600;
cursor:pointer;
}

/* ===== SPARKLES ===== */
#sparkleCanvas{
position:fixed;
inset:0;
z-index:0;
pointer-events:none;
}

/* ===== PROFILE ===== */
.field{margin:10px 0;font-size:14px;color:var(--muted);}
.field span{color:#fff}

/* ===== TOAST ===== */
.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#222;
padding:10px 16px;
border-radius:10px;
display:none;
}
.toast.show{display:block;}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splashScreen">
  <div class="spinner"></div>
  <p style="margin-top:10px;color:#666;">Loading user session...</p>
</div>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<canvas id="sparkleCanvas"></canvas>

<div id="app">

<!-- LOGIN -->
<div class="screen active" id="loginScreen">
  <div class="card">
    <h2>FB Login App</h2>
    <button class="btn-facebook" onclick="handleFBLogin()">
      Continue with Facebook
    </button>
  </div>
</div>

<!-- PROFILE -->
<div class="screen" id="profileScreen">
  <div class="card">

    <h3 id="name">User</h3>

    <div class="field">Email: <span id="email">-</span></div>
    <div class="field">Gender: <span id="gender">-</span></div>
    <div class="field">Birthday: <span id="birthday">-</span></div>
    <div class="field">ID: <span id="id">-</span></div>

    <button class="btn-facebook" onclick="handleLogout()">Logout</button>
  </div>
</div>

</div>

<div class="toast" id="toast"></div>

<!-- SPARKLES SCRIPT (RESTORED WORKING) -->
<script>
const canvas=document.getElementById("sparkleCanvas");
const ctx=canvas.getContext("2d");
let w,h,particles=[];

function resize(){
w=canvas.width=innerWidth;
h=canvas.height=innerHeight;
}
window.onresize=resize;
resize();

function Particle(){
this.x=Math.random()*w;
this.y=Math.random()*h;
this.vx=(Math.random()-.5)*0.5;
this.vy=(Math.random()-.5)*0.5;
this.r=Math.random()*2;
}

Particle.prototype.update=function(){
this.x+=this.vx;
this.y+=this.vy;
if(this.x<0||this.x>w) this.x=Math.random()*w;
if(this.y<0||this.y>h) this.y=Math.random()*h;
};

Particle.prototype.draw=function(){
ctx.fillStyle="#ffffff55";
ctx.beginPath();
ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
ctx.fill();
};

for(let i=0;i<80;i++) particles.push(new Particle());

function animate(){
ctx.clearRect(0,0,w,h);
particles.forEach(p=>{p.update();p.draw();});
requestAnimationFrame(animate);
}
animate();
</script>

<!-- FACEBOOK SDK -->
<script>
const FB_APP_ID="962740976398168";

function showScreen(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function showToast(msg){
const t=document.getElementById("toast");
t.innerText=msg;
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),3000);
}

function handleFBLogin(){
FB.login(res=>{
if(res.authResponse){
fetchData();
}else{
showToast("Login cancelled");
}
},{scope:"public_profile,email"});
}

function fetchData(){
FB.api("/me",{fields:"id,name,email,gender,birthday"},res=>{
document.getElementById("name").innerText=res.name||"-";
document.getElementById("email").innerText=res.email||"-";
document.getElementById("gender").innerText=res.gender||"-";
document.getElementById("birthday").innerText=res.birthday||"-";
document.getElementById("id").innerText=res.id||"-";

showScreen("profileScreen");
});
}

function handleLogout(){
FB.logout(()=>showScreen("loginScreen"));
}

/* SAFE INIT */
window.fbAsyncInit=function(){
FB.init({
appId:FB_APP_ID,
cookie:true,
xfbml:true,
version:"v19.0"
});

FB.getLoginStatus(()=>{});

/* SAFE SPLASH REMOVE */
setTimeout(()=>{
document.getElementById("splashScreen").style.display="none";
},2000);
};

/* LOAD SDK */
(function(d,s,id){
var js,fjs=d.getElementsByTagName(s)[0];
if(d.getElementById(id))return;
js=d.createElement(s);
js.id=id;
js.src="https://connect.facebook.net/en_US/sdk.js";
fjs.parentNode.insertBefore(js,fjs);
}(document,'script','facebook-jssdk'));

/* EXTRA SAFETY */
setTimeout(()=>{
document.getElementById("splashScreen").style.display="none";
},5000);

</script>

</body>
</html>
